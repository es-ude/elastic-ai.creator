[project]
site_name = "Elastic-AI.creator"
site_description = "Design, train and compile neural networks optimized specifically for FPGAs."
site_author = "ies-ude"
site_url = "https://es-ude.github.io/elastic-ai.creator/"
site_dir = "build/docs"
docs_dir = "docs/"
repo_url = "https://github.com/es-ude/elastic-ai.creator/"
edit_uri = "edit/main/docs/"
copyright = "Copyright © 2024, ies-ude (Intelligent Embedded System - University Duisburg-Essen)"
extra_javascript = [
  "javascripts/mathjax.js",
  "https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js",
  "https://unpkg.com/wavedrom@3/wavedrom.min.js",
  "docs/javascript",
]

nav = [
  "index.md",
  { "Documentation" = [
    "ir.md",
    "torch2ir.md",
    "ir2vhdl.md",
    "system_integrations.md",
    "testing.md",
    "pipelined_hw_components.md",
    "quantized_grads.md",
    "plugin-system.md",
  ] },
  { "Plugins" = [
    "plugins/skeleton.md",
    "plugins/combinatorial.md",
    "plugins/shift_register.md",
    "plugins/sliding_window.md",
    "plugins/time_multiplexed_sequential.md",
    "plugins/lutron.md",
  ] },
  { "API Reference" = [
    "api/core.md",
    "api/nn.md",
    "api/plugins.md",
    "api/testing.md",
  ] },
  "contributing.md",
]

[project.theme]
features = [
  "announce.dismiss",
  "content.action.edit",
  "content.action.view",
  "content.code.copy",
  "content.tooltips",
  "navigation.footer",
  "navigation.indexes",
  "navigation.sections",
  "navigation.tabs",
  "navigation.top",
  "navigation.path",
  "navigation.tracking",
  "search.highlight",
  "search.share",
  "toc.follow",
]

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[project.plugins.offline]

[project.plugins.mkdocstrings.handlers.python]
inventories = ["https://docs.python.org/3/objects.inv"]
paths = ["src"]

[project.plugins.mkdocstrings.handlers.python.options]
docstring_style = "google"
inherited_members = true
show_source = false
docstring_options = { ignore_init_summary = true }
docstring_section_style = "list"
# unwrap_annotaded = true # crashes zensical
filters = "public"
summary = true
# heading_level = 1
parameter_headings = true
# type_parameters_headings = true # crashes zensical
show_root_full_path = false
show_symbol_type_heading = true
show_symbol_type_toc = true
line_length = 88
merge_init_into_class = true
separate_signature = true
signature_crossrefs = true
show_signature_annotations = true
show_overloads = true
overloads_only = true
# backlinks = "tree"
# show_inheritance_diagram = true

[project.markdown_extensions.abbr]

[project.markdown_extensions.admonition]

[project.markdown_extensions.attr_list]

[project.markdown_extensions.def_list]

[project.markdown_extensions.footnotes]

[project.markdown_extensions.md_in_html]

[project.markdown_extensions.toc]
permalink = true

[project.markdown_extensions.pymdownx.arithmatex]
generic = true

[project.markdown_extensions.pymdownx.betterem]

[project.markdown_extensions.pymdownx.caret]

[project.markdown_extensions.pymdownx.details]

[project.markdown_extensions.pymdownx.emoji]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index = "zensical.extensions.emoji.twemoji"

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true

[project.markdown_extensions.pymdownx.inlinehilite]

[project.markdown_extensions.pymdownx.keys]

[project.markdown_extensions.pymdownx.magiclink]

[project.markdown_extensions.pymdownx.mark]

[project.markdown_extensions.pymdownx.smartsymbols]

[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
combine_header_slug = true

[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true

[project.markdown_extensions.pymdownx.tilde]

[project.markdown_extensions.pymdownx.snippets]

[project.markdown_extensions.markdown_wavedrom]
